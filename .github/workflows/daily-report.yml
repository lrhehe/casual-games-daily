name: Daily Casual Games Report

on:
  schedule:
    # 每天北京时间 9:00 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch:  # 手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 google-play-scraper pytz

      - name: Generate report
        run: python3 scripts/generate_report.py
        env:
          TZ: Asia/Shanghai

      - name: Commit and push
        run: |
          git config user.name "Game Report Bot"
          git config user.email "bot@casualgames.daily"
          
          git add reports/ index.html data/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Daily report: $(TZ=Asia/Shanghai date +%Y-%m-%d)"
          git push
